<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/oxford-frontend-backoffice/CSS/registro.css">
    <title>Register</title>
</head>
<body>
    

    <section class="logo">
        <img src="/img/logo.png" alt="">    
    </section>

    <section class="title">
        <h1>REGISTRO DE INFORMACIÓN DEL ALUMNO</h1>
    </section>


    <section class="information">
        <a href="../Html/welcome.html   ">Ir a Welcome</a>
        <form action="">
            <div>
            <div class="question">
                <h2>Información personal del alumno</h2>
                <label for="dni">DNI</label>
                <input type="number" id="dni" required>
                <span></span>

                <label for="name">Nombre completo</label>
                <input type="text" id="name" required>
                <span></span>

                <label for="surname">Apellido paterno</label>
                <input type="text" id="surname" required>
                <span></span>
                
                <label for="secondsurname">Apellido materno</label>
                <input type="text" id="secondsurname" required>
                <span></span>

                <label for="birth">Fecha de nacimiento</label>
                <input type="date" id="birth" required>
                <span></span>

                <label for="phone">Teléfono de casa</label>
                <input type="number" id="phone" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" required>
                <span></span>

                <label for="cel">Celular</label>
                <input type="number" id="cel" required>
                <span></span>

                <label for="address">Dirección</label>
                <input type="text" id="address" placeholder="Calle/Avenida/Jirón" required>
                <input type="text" id="address" placeholder="Edif./Etapa/Mzna" required>
                <input type="number" id="address" placeholder="Número" required>

                <label for="center">Centro laboral / Estudios</label>
                <input type="text" id="center" required>

                <label for="study">¿Ha estudiado Inglés en alguna otra institución?</label>
                <input type="radio" name="study"> Si
                <input type="radio" name="study"> No

                <label for="where">¿Cúal?</label>
                <input type="text" id="where">
                <label for="certification">¿Ha tomado alguna certificación internacional?</label>
                <input type="checkbox"> FCE
                <input type="checkbox"> CAE
                <input type="checkbox"> CPE
                <input type="checkbox"> KET
                <input type="checkbox"> PET
                <input type="checkbox"> Otro

                <label for="other">¿Cúal?</label>
                <input type="text" id="other">

                <label for="coments">Comentarios adicionales</label>
                <textarea name="" id="coments" cols="130" rows="2"></textarea>
                <canvas id="firma"></canvas>
                <button id="btnLimpiar">Limpiar</button>
                <h4> Firma del alumno</h4>
            </div>
            <div class="question">
                <h2>Información del(los) padre(s) y/o Apoderado(s)<br>*sólo si es menor de edad</h2>
                <label for="apoderado">  Nombre(s) del Padre / Apoderado:</label>
                <input type="text" id="apoderado">

                <label for="tel">Teléfono (s) de Contacto:</label>
                <input type="number" id="tel">

                <canvas type="button" id="firma1"></canvas>
                <button id="btnLimpia">Limpiar</button>
                <h4> Firma del padre o apoderado</h4>
            </div>
            <div class="question">
                <h4>Firma del encargado de sistemas</h4>
                <canvas id="firma2"></canvas>
                <button type="button" id="btnLimpia">Limpiar</button>
                <h4>Fecha de registro</h4>
                <label for="date"></label>
                <input type="date" id="date">
                <input type="submit">
            </div>
        </div>
        </form>


    <script src="/oxford-frontend-backoffice/Js/register.js"></script>
</body>
</html>
